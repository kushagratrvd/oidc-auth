<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register Application</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --fg: #09090b;
      --muted: #71717a;
      --border: #e4e4e7;
      --input-bg: #ffffff;
      --ring: #18181b;
      --card-bg: #ffffff;
      --card-shadow: 0 1px 3px 0 rgb(0 0 0 / .1), 0 1px 2px -1px rgb(0 0 0 / .1);
      --radius: 0.5rem;
      --btn-bg: #18181b;
      --btn-fg: #fafafa;
      --btn-hover: #27272a;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #09090b;
        --fg: #fafafa;
        --muted: #a1a1aa;
        --border: #27272a;
        --input-bg: #09090b;
        --ring: #d4d4d8;
        --card-bg: #18181b;
        --card-shadow: 0 1px 3px 0 rgb(0 0 0 / .4), 0 1px 2px -1px rgb(0 0 0 / .4);
        --btn-bg: #fafafa;
        --btn-fg: #18181b;
        --btn-hover: #e4e4e7;
      }
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--fg);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 4px);
      box-shadow: var(--card-shadow);
      padding: 2rem;
    }

    .header {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .icon {
      width: 40px;
      height: 40px;
      background: var(--fg);
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .icon svg { color: var(--bg); }

    h1 {
      font-size: 1.375rem;
      font-weight: 600;
      line-height: 1.3;
    }

    .subtitle {
      font-size: 0.875rem;
      color: var(--muted);
      margin-top: 0.35rem;
      line-height: 1.5;
    }

    .form { display: flex; flex-direction: column; gap: 1rem; }

    .field { display: flex; flex-direction: column; gap: 0.4rem; }

    label {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--fg);
    }

    input {
      width: 100%;
      height: 2.375rem;
      padding: 0 0.75rem;
      font-family: inherit;
      font-size: 0.875rem;
      color: var(--fg);
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input::placeholder { color: var(--muted); }

    input:focus {
      border-color: var(--ring);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--ring) 20%, transparent);
    }

    button {
      width: 100%;
      height: 2.375rem;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--btn-fg);
      background: var(--btn-bg);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      margin-top: 0.25rem;
      transition: background 0.15s, opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    button:hover { background: var(--btn-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid color-mix(in srgb, var(--btn-fg) 30%, transparent);
      border-top-color: var(--btn-fg);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .message {
      display: none;
      font-size: 0.8125rem;
      border-radius: var(--radius);
      padding: 0.625rem 0.75rem;
      line-height: 1.5;
    }

    .message.error {
      color: #ef4444;
      background: color-mix(in srgb, #ef4444 10%, transparent);
      border: 1px solid color-mix(in srgb, #ef4444 25%, transparent);
    }

    .message.success {
      color: #16a34a;
      background: color-mix(in srgb, #16a34a 10%, transparent);
      border: 1px solid color-mix(in srgb, #16a34a 25%, transparent);
    }

    .result {
      display: none;
      margin-top: 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .row {
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 0.75rem;
      padding: 0.75rem;
      border-top: 1px solid var(--border);
    }

    .row:first-child { border-top: 0; }

    .row span {
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 500;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 0.75rem;
      overflow-wrap: anywhere;
    }

    .footer {
      text-align: center;
      font-size: 0.8125rem;
      color: var(--muted);
      margin-top: 1.25rem;
    }

    .footer a {
      color: var(--fg);
      font-weight: 500;
      text-decoration: none;
    }

    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <div class="icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14"/>
          <path d="M5 12h14"/>
        </svg>
      </div>
      <h1>Register application</h1>
      <p class="subtitle">Create an OAuth client for an application callback.</p>
    </div>

    <form class="form" id="applicationForm" novalidate>
      <div id="errorMsg" class="message error" role="alert"></div>
      <div id="successMsg" class="message success" role="status"></div>

      <div class="field">
        <label for="name">Application name</label>
        <input id="name" name="name" type="text" autocomplete="off" placeholder="Demo App" maxlength="100" required />
      </div>

      <div class="field">
        <label for="redirectUri">Redirect URI</label>
        <input id="redirectUri" name="redirectUri" type="url" autocomplete="off" placeholder="http://localhost:3000/callback" required />
      </div>

      <button type="submit" id="submitBtn">
        <span class="spinner" id="spinner"></span>
        <span id="btnText">Create application</span>
      </button>
    </form>

    <div class="result" id="result">
      <div class="row">
        <span>Name</span>
        <code id="resultName"></code>
      </div>
      <div class="row">
        <span>Client ID</span>
        <code id="resultClientId"></code>
      </div>
      <div class="row">
        <span>Client secret</span>
        <code id="resultClientSecret"></code>
      </div>
      <div class="row">
        <span>Redirect URI</span>
        <code id="resultRedirectUri"></code>
      </div>
    </div>

    <div class="footer">
      Need to sign in? <a href="/authenticate.html">Sign in</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('applicationForm');
    const submitBtn = document.getElementById('submitBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const result = document.getElementById('result');
    const resultName = document.getElementById('resultName');
    const resultClientId = document.getElementById('resultClientId');
    const resultClientSecret = document.getElementById('resultClientSecret');
    const resultRedirectUri = document.getElementById('resultRedirectUri');

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
      successMsg.style.display = 'none';
    }

    function showSuccess(msg) {
      successMsg.textContent = msg;
      successMsg.style.display = 'block';
      errorMsg.style.display = 'none';
    }

    function hideMessages() {
      errorMsg.style.display = 'none';
      successMsg.style.display = 'none';
    }

    function setLoading(loading) {
      submitBtn.disabled = loading;
      spinner.style.display = loading ? 'block' : 'none';
      btnText.textContent = loading ? 'Creating...' : 'Create application';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessages();

      const name = document.getElementById('name').value.trim();
      const redirectUri = document.getElementById('redirectUri').value.trim();

      if (!name || !redirectUri) {
        showError('Application name and redirect URI are required.');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch('/applications', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            name,
            redirect_uri: redirectUri,
          }),
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          showError(data.message || 'Unable to create application.');
          return;
        }

        resultName.textContent = data.name;
        resultClientId.textContent = data.client_id;
        resultClientSecret.textContent = data.client_secret;
        resultRedirectUri.textContent = data.redirect_uri;
        result.style.display = 'block';
        showSuccess('Application created. The client secret is shown only once.');
        form.reset();
      } catch {
        showError('Unable to create application.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
